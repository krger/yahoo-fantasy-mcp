name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0  # no moving v8 tag published; pin exact
        with:
          enable-cache: true
          python-version: "3.13"  # match the deploy host (production) interpreter

      - name: Sync dependencies (incl. dev group)
        run: uv sync --group dev --locked

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run parser tests
        run: uv run pytest -q

      # Fail the build if a locked dependency has a published advisory, so a
      # CVE blocks a merge instead of waiting on a Dependabot bump. Audits the
      # production tree (--no-dev) to match what actually ships to the deploy
      # host; --no-emit-project drops the editable self-package (not on PyPI).
      - name: Audit dependencies for known advisories
        run: |
          uv export --frozen --no-dev --no-emit-project --no-hashes --format requirements-txt -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
