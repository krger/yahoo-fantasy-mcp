name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0  # no moving v8 tag published; pin exact
        with:
          enable-cache: true
          python-version: "3.13"  # match the deploy host (production) interpreter

      - name: Sync dependencies (incl. dev group)
        run: uv sync --group dev --locked

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run parser tests
        run: uv run pytest -q
