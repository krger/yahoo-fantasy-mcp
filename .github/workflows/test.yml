name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dependencies (incl. dev group)
        run: uv sync --group dev --locked

      - name: Run parser tests
        run: uv run pytest -q
